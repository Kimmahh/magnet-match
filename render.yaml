services:
  - type: web
    name: magnet-match
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: magnet-match-db
          property: connectionString

databases:
  - name: magnet-match-db
    plan: free
